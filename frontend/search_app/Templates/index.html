<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelSearch AI | Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        pre { background: #0d1117; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 1.5rem 0; border: 1px solid #30363d; }
        code { color: #e5e7eb; font-family: 'Fira Code', monospace; font-size: 0.9em; }
        
        /* Design Pro du Rapport */
        .report-body { line-height: 1.8; color: #d1d5db; }
        .report-body h1 { color: #60a5fa; font-size: 1.8rem; font-weight: 800; margin-top: 2rem; border-bottom: 1px solid #374151; padding-bottom: 0.5rem; }
        .report-body h2 { color: #93c5fd; font-size: 1.4rem; font-weight: 700; margin-top: 1.5rem; }
        .report-body p { margin-bottom: 1.2rem; }
        .report-body ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1.2rem; }
        .report-body li { margin-bottom: 0.5rem; }

        .btn-action { @apply flex items-center gap-2 text-[11px] bg-gray-800/50 hover:bg-gray-700 px-3 py-2 rounded-lg border border-gray-700 transition-all; }
        .copy-success { border-color: #10b981 !important; color: #10b981 !important; }
    </style>
</head>
<body class="bg-[#0b0e14] text-gray-200 font-sans h-screen flex overflow-hidden">

    <aside id="sidebar" class="w-64 bg-[#161b22] border-r border-gray-800 flex flex-col transition-all duration-300 hidden md:flex">
        <div class="p-4">
            <button onclick="window.location.reload()" class="w-full flex items-center justify-between border border-gray-700 rounded-lg p-3 hover:bg-gray-800 transition text-sm">
                <span><i class="fas fa-plus mr-2 text-blue-500"></i> Nouveau</span>
                <i class="fas fa-search text-gray-600 text-xs"></i>
            </button>
        </div>

        <div class="flex-grow overflow-y-auto px-2 space-y-1">
            <div class="text-[10px] uppercase font-bold text-gray-500 px-3 mt-4 mb-2 tracking-widest">Historique</div>
            <div id="history-list">
                {% for item in history %}
                <button onclick="loadHistory('{{ item.id }}')" 
                    class="w-full text-left p-3 rounded-lg hover:bg-gray-800 transition text-xs truncate group flex items-center mb-1">
                    <i class="far fa-comment-alt mr-3 text-gray-500 group-hover:text-blue-400"></i>
                    <span class="truncate flex-grow">{{ item.query }}</span>
                </button>
                {% empty %}
                <p class="text-[10px] text-gray-600 px-3 italic">Aucune archive</p>
                {% endfor %}
            </div>
        </div>

        <div class="p-4 border-t border-gray-800">
            <div class="flex items-center space-x-3 mb-4 px-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-sm font-bold shadow-lg shadow-blue-900/20">
                    {{ user.username|first|upper }}
                </div>
                <span class="text-sm font-medium">{{ user.username }}</span>
            </div>
            <a href="{% url 'logout' %}" class="flex items-center p-2 text-sm text-red-400 hover:bg-red-900/20 rounded-lg transition">
                <i class="fas fa-sign-out-alt mr-3"></i> Déconnexion
            </a>
        </div>
    </aside>

    <main class="flex-grow flex flex-col relative h-full">
        <header class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#0b0e14]/80 backdrop-blur-md sticky top-0 z-10">
            <div class="flex items-center space-x-4">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white"><i class="fas fa-bars text-xl"></i></button>
                <h2 class="text-lg font-black bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent italic tracking-tight">IntelSearch AI</h2>
            </div>
            <div class="flex items-center space-x-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></span>
                <span class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Live Status</span>
            </div>
        </header>

        <div id="chat-viewport" class="flex-grow overflow-y-auto p-4 md:p-10 scroll-smooth">
            <div id="placeholder" class="h-full flex flex-col items-center justify-center space-y-6 max-w-2xl mx-auto opacity-30">
                <div class="w-20 h-20 bg-gray-800 rounded-3xl flex items-center justify-center text-4xl shadow-inner border border-gray-700">
                    <i class="fas fa-brain text-blue-500"></i>
                </div>
                <div class="text-center"><h3 class="text-2xl font-bold text-gray-100">Prêt pour l'analyse</h3></div>
            </div>
            
            <div id="output" class="max-w-4xl mx-auto"></div>
        </div>

        <div class="p-6 bg-gradient-to-t from-[#0b0e14] via-[#0b0e14] to-transparent">
            <div class="max-w-3xl mx-auto relative">
                <input type="text" id="userInput" 
                    class="w-full bg-[#161b22] border border-gray-700 rounded-2xl py-5 pl-6 pr-16 focus:ring-2 focus:ring-blue-500/30 outline-none transition shadow-2xl placeholder-gray-600 text-sm"
                    placeholder="Qu'est-ce qu'on analyse aujourd'hui ?" onkeypress="if(event.key === 'Enter') submitQuery()">
                <button onclick="submitQuery()" class="absolute right-4 top-3 p-3 text-blue-500 hover:text-blue-400 active:scale-90 transition">
                    <i class="fas fa-paper-plane text-lg"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }

        // --- Rendu du Rapport Pro ---
        function createReportUI(query, report, date = "À l'instant") {
            const aiId = 'report-' + Date.now();
            return `
                <div id="${aiId}" class="fade-in mb-12">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 border-b border-gray-800 pb-6">
                        <div>
                            <h1 class="text-2xl font-black text-white tracking-tight">${query}</h1>
                            <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em] mt-1 font-bold">Rapport d'Intelligence • ${date}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="copyToClipboard(this, '${aiId}-content')" class="btn-action">
                                <i class="far fa-copy"></i> <span>Copier</span>
                            </button>
                            <button onclick="exportToPDF('${aiId}')" class="btn-action text-blue-400 border-blue-500/20 bg-blue-500/5 hover:bg-blue-500/10">
                                <i class="far fa-file-pdf"></i> <span>PDF</span>
                            </button>
                            <button onclick="downloadMd('${query}', '${aiId}-content')" class="btn-action">
                                <i class="fab fa-markdown"></i> <span>Markdown</span>
                            </button>
                        </div>
                    </div>
                    <div id="${aiId}-content" class="report-body prose prose-invert max-w-none">
                        ${marked.parse(report)}
                    </div>
                </div>
            `;
        }

        // --- Actions ---
        function copyToClipboard(btn, contentId) {
            const text = document.getElementById(contentId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const span = btn.querySelector('span');
                const icon = btn.querySelector('i');
                btn.classList.add('copy-success');
                span.innerText = "Copié !";
                icon.className = "fas fa-check";
                setTimeout(() => {
                    btn.classList.remove('copy-success');
                    span.innerText = "Copier";
                    icon.className = "far fa-copy";
                }, 2000);
            });
        }

        function exportToPDF(containerId) {
            const element = document.getElementById(containerId);
            const opt = {
                margin: 10,
                filename: 'Rapport_IntelSearch.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, backgroundColor: '#0b0e14' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        // --- Logique de Recherche ---
        async function submitQuery() {
            const input = document.getElementById('userInput');
            const query = input.value.trim();
            if (!query) return;

            document.getElementById('placeholder').style.display = 'none';
            const output = document.getElementById('output');
            
            // Afficher le loader
            const loaderId = 'loader-' + Date.now();
            output.innerHTML = `<div id="${loaderId}" class="flex items-center gap-4 p-8 animate-pulse">
                <i class="fas fa-circle-notch fa-spin text-blue-500"></i>
                <span class="text-sm text-gray-500 font-bold uppercase tracking-widest text-[10px]">Analyses en cours...</span>
            </div>`;
            input.value = '';

            const formData = new FormData();
            formData.append('query', query);
            formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

            try {
                const response = await fetch("{% url 'process' %}", { method: "POST", body: formData });
                const data = await response.json();
                document.getElementById(loaderId).remove();
                
                if (data.report) {
                    output.innerHTML = createReportUI(query, data.report);
                    addToSidebar(data.id, query);
                }
            } catch (err) {
                document.getElementById(loaderId).innerHTML = `<p class="text-red-400">Erreur de connexion.</p>`;
            }
        }

        async function loadHistory(id) {
            const output = document.getElementById('output');
            document.getElementById('placeholder').style.display = 'none';
            output.innerHTML = `<div class="p-20 text-center"><i class="fas fa-spinner fa-spin text-2xl text-blue-500"></i></div>`;

            const response = await fetch(`/history/${id}/`);
            const data = await response.json();
            output.innerHTML = createReportUI(data.query, data.report, data.date);
            document.getElementById('chat-viewport').scrollTop = 0;
        }

        function addToSidebar(id, title) {
            const list = document.getElementById('history-list');
            const btn = document.createElement('button');
            btn.onclick = () => loadHistory(id);
            btn.className = "w-full text-left p-3 rounded-lg hover:bg-gray-800 transition text-xs truncate flex items-center mb-1 fade-in";
            btn.innerHTML = `<i class="far fa-comment-alt mr-3 text-gray-500"></i><span class="truncate">${title}</span>`;
            list.prepend(btn);
            const empty = list.querySelector('p'); if(empty) empty.remove();
        }

        function downloadMd(name, contentId) {
            const content = document.getElementById(contentId).innerText;
            const blob = new Blob([content], {type: 'text/markdown'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `rapport_${name.substring(0,15).replace(/\s+/g, '_')}.md`;
            a.click();
        }
    </script>
</body>
</html>
